services:
  postgres:
    image: postgres:16-alpine
    container_name: vapt-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: vapt
      POSTGRES_PASSWORD: vapt_password
      POSTGRES_DB: vapt_agendamentos
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: vapt-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
